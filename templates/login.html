<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — Monster Fitness</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/css/main.css" />
</head>
<body>

<nav class="navbar navbar-dark mf-navbar fixed-top">
  <div class="container">
    <a class="navbar-brand d-flex align-items-center gap-2" href="/">
      <svg width="28" height="28" viewBox="0 0 36 36" fill="none" aria-hidden="true">
        <polygon points="20,2 10,20 17,20 16,34 26,16 19,16" fill="#39FF14"/>
      </svg>
      <span class="brand-text">MONSTER <span class="brand-accent">FITNESS</span></span>
    </a>
  </div>
</nav>

<section class="auth-section">
  <div class="container">
    <div class="auth-card">
      <div class="text-center mb-4">
        <svg width="36" height="62" viewBox="0 0 48 84" fill="none" aria-hidden="true" class="mb-3">
          <polygon points="32,2 12,42 24,42 22,82 38,46 26,46" fill="#39FF14" opacity="0.85"/>
        </svg>
        <h1 class="auth-title">Bem-vindo de volta</h1>
        <p class="auth-subtitle">Faça login para acessar seu treino</p>
      </div>

      <div id="alertMsg" class="alert-mf d-none" role="alert"></div>
      <div id="successMsg" class="alert-mf-success d-none" role="status"></div>

      <form id="loginForm" novalidate>
        <input type="hidden" name="csrf_token" id="csrfToken" />
        <div class="mb-3">
          <label class="form-label" for="email">E-mail</label>
          <input type="email" class="form-control" id="email" name="email" placeholder="seu@email.com" autocomplete="email" required />
          <div class="invalid-feedback">Informe um e-mail válido.</div>
        </div>
        <div class="mb-3">
          <label class="form-label" for="password">Senha</label>
          <div class="position-relative">
            <input type="password" class="form-control" id="password" name="password" placeholder="••••••••" autocomplete="current-password" required />
            <button type="button" class="btn-show-pwd" id="togglePwd" aria-label="Mostrar senha">
              <i class="bi bi-eye" id="eyeIcon"></i>
            </button>
          </div>
        </div>
        <div class="d-flex justify-content-between align-items-center mb-4">
          <div class="form-check">
            <input class="form-check-input" type="checkbox" id="rememberMe" />
            <label class="form-check-label" for="rememberMe" style="font-size:0.8rem; color: var(--mf-gray);">Lembrar de mim</label>
          </div>
          <a href="#" class="auth-link">Esqueci minha senha</a>
        </div>
        <button type="submit" class="btn-accent-full" id="loginBtn">
          <span id="loginText">Entrar</span>
          <span id="loginSpinner" class="d-none"><span class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span>Entrando...</span>
        </button>
      </form>

      <p class="auth-divider mt-4">Não tem conta? <a href="/cadastro" class="auth-link">Cadastre-se grátis</a></p>
    </div>
  </div>
</section>

<style>
.btn-show-pwd {
  position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
  background: none; border: none; color: var(--mf-gray); cursor: pointer; padding: 0; font-size: 1rem;
}
.btn-show-pwd:hover { color: var(--mf-white); }
.form-check-input { background-color: var(--mf-black); border-color: var(--mf-black-border); }
.form-check-input:checked { background-color: var(--mf-green); border-color: var(--mf-green); }
</style>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
// Toggle password visibility
document.getElementById('togglePwd').addEventListener('click', function() {
  const pwd = document.getElementById('password');
  const icon = document.getElementById('eyeIcon');
  if (pwd.type === 'password') {
    pwd.type = 'text';
    icon.className = 'bi bi-eye-slash';
  } else {
    pwd.type = 'password';
    icon.className = 'bi bi-eye';
  }
});

// Fetch CSRF token on load
async function fetchCsrf() {
  try {
    const r = await fetch('/api/csrf-token');
    const d = await r.json();
    document.getElementById('csrfToken').value = d.token || '';
  } catch {}
}
fetchCsrf();

// Form submit
document.getElementById('loginForm').addEventListener('submit', async function(e) {
  e.preventDefault();
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const alertMsg = document.getElementById('alertMsg');
  const successMsg = document.getElementById('successMsg');

  alertMsg.classList.add('d-none');
  successMsg.classList.add('d-none');

  if (!email || !password) {
    alertMsg.textContent = 'Preencha e-mail e senha.';
    alertMsg.classList.remove('d-none'); return;
  }

  const btn = document.getElementById('loginBtn');
  document.getElementById('loginText').classList.add('d-none');
  document.getElementById('loginSpinner').classList.remove('d-none');
  btn.disabled = true;

  try {
    const csrf = document.getElementById('csrfToken').value;
    const res = await fetch('/api/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'X-CSRF-Token': csrf },
      body: JSON.stringify({ email, password })
    });
    const data = await res.json();

    if (res.ok && data.success) {
      successMsg.textContent = 'Login realizado! Redirecionando...';
      successMsg.classList.remove('d-none');
      setTimeout(() => window.location.href = '/dashboard', 1000);
    } else {
      alertMsg.textContent = data.message || 'E-mail ou senha inválidos.';
      alertMsg.classList.remove('d-none');
    }
  } catch {
    alertMsg.textContent = 'Erro de conexão. Tente novamente.';
    alertMsg.classList.remove('d-none');
  } finally {
    document.getElementById('loginText').classList.remove('d-none');
    document.getElementById('loginSpinner').classList.add('d-none');
    btn.disabled = false;
  }
});
</script>
</body>
</html>

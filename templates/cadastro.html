<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cadastro — Monster Fitness</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/css/main.css" />
</head>
<body>

<nav class="navbar navbar-dark mf-navbar fixed-top">
  <div class="container">
    <a class="navbar-brand d-flex align-items-center gap-2" href="/">
      <svg width="28" height="28" viewBox="0 0 36 36" fill="none" aria-hidden="true">
        <polygon points="20,2 10,20 17,20 16,34 26,16 19,16" fill="#39FF14"/>
      </svg>
      <span class="brand-text">MONSTER <span class="brand-accent">FITNESS</span></span>
    </a>
    <a href="/login" class="btn btn-outline-accent btn-sm">Já tenho conta</a>
  </div>
</nav>

<section class="auth-section" style="padding-top: 6rem; padding-bottom: 4rem;">
  <div class="container">
    <div class="auth-card" style="max-width: 560px;">
      <div class="text-center mb-4">
        <svg width="32" height="56" viewBox="0 0 48 84" fill="none" aria-hidden="true" class="mb-2">
          <polygon points="32,2 12,42 24,42 22,82 38,46 26,46" fill="#39FF14" opacity="0.85"/>
        </svg>
        <h1 class="auth-title">Crie sua conta</h1>
        <p class="auth-subtitle">Comece sua jornada na Monster Fitness hoje</p>
      </div>

      <div id="alertMsg" class="alert-mf d-none" role="alert"></div>
      <div id="successMsg" class="alert-mf-success d-none" role="status"></div>

      <!-- Step indicator -->
      <div class="step-indicator d-flex gap-2 mb-4">
        <div class="step-dot active" id="dot1"></div>
        <div class="step-dot" id="dot2"></div>
        <div class="step-dot" id="dot3"></div>
      </div>

      <form id="cadastroForm" novalidate>
        <input type="hidden" name="csrf_token" id="csrfToken" />

        <!-- STEP 1: Dados pessoais -->
        <div id="step1">
          <p class="step-label">Passo 1 de 3 — Dados pessoais</p>
          <div class="row g-3">
            <div class="col-sm-6">
              <label class="form-label" for="nome">Nome completo</label>
              <input type="text" class="form-control" id="nome" placeholder="Seu nome" autocomplete="name" />
            </div>
            <div class="col-sm-6">
              <label class="form-label" for="cpf">CPF</label>
              <input type="text" class="form-control" id="cpf" placeholder="000.000.000-00" maxlength="14" />
            </div>
            <div class="col-sm-6">
              <label class="form-label" for="nascimento">Data de nascimento</label>
              <input type="date" class="form-control" id="nascimento" />
            </div>
            <div class="col-sm-6">
              <label class="form-label" for="telefone">Telefone / WhatsApp</label>
              <input type="tel" class="form-control" id="telefone" placeholder="(61) 99999-9999" />
            </div>
          </div>
          <div class="d-flex justify-content-end mt-4">
            <button type="button" class="btn-accent-full" style="max-width:160px" onclick="goStep(2)">Próximo <i class="bi bi-arrow-right ms-1"></i></button>
          </div>
        </div>

        <!-- STEP 2: Acesso -->
        <div id="step2" class="d-none">
          <p class="step-label">Passo 2 de 3 — Acesso à conta</p>
          <div class="mb-3">
            <label class="form-label" for="email">E-mail</label>
            <input type="email" class="form-control" id="email" placeholder="seu@email.com" autocomplete="email" />
          </div>
          <div class="mb-3">
            <label class="form-label" for="password">Senha</label>
            <div class="position-relative">
              <input type="password" class="form-control" id="password" placeholder="Mínimo 8 caracteres" autocomplete="new-password" oninput="checkPwd(this.value)" />
              <button type="button" class="btn-show-pwd" onclick="togglePwd('password','eye1')" aria-label="Mostrar senha"><i class="bi bi-eye" id="eye1"></i></button>
            </div>
            <div class="pwd-strength">
              <div class="pwd-bar"><div class="pwd-bar-fill" id="pwdBar"></div></div>
              <span class="pwd-label" id="pwdLabel">Digite uma senha</span>
            </div>
          </div>
          <div class="mb-3">
            <label class="form-label" for="confirmPwd">Confirmar senha</label>
            <div class="position-relative">
              <input type="password" class="form-control" id="confirmPwd" placeholder="Repita a senha" autocomplete="new-password" />
              <button type="button" class="btn-show-pwd" onclick="togglePwd('confirmPwd','eye2')" aria-label="Mostrar senha"><i class="bi bi-eye" id="eye2"></i></button>
            </div>
          </div>
          <div class="d-flex gap-2 justify-content-between mt-4">
            <button type="button" class="btn btn-outline-accent" style="min-width:100px" onclick="goStep(1)"><i class="bi bi-arrow-left me-1"></i> Voltar</button>
            <button type="button" class="btn-accent-full" style="max-width:160px" onclick="goStep(3)">Próximo <i class="bi bi-arrow-right ms-1"></i></button>
          </div>
        </div>

        <!-- STEP 3: Plano e objetivo -->
        <div id="step3" class="d-none">
          <p class="step-label">Passo 3 de 3 — Plano e objetivo</p>
          <div class="mb-3">
            <label class="form-label" for="plano">Plano desejado</label>
            <select class="form-select" id="plano">
              <option value="">Selecione um plano</option>
              <option value="mensal">Mensal</option>
              <option value="trimestral">Trimestral</option>
              <option value="semestral">Semestral</option>
              <option value="anual">Anual</option>
              <option value="premium">Premium</option>
            </select>
          </div>
          <div class="mb-3">
            <label class="form-label" for="objetivo">Objetivo principal</label>
            <select class="form-select" id="objetivo">
              <option value="">Selecione seu objetivo</option>
              <option value="hipertrofia">Ganho de massa (hipertrofia)</option>
              <option value="emagrecimento">Emagrecimento</option>
              <option value="condicionamento">Condicionamento físico</option>
              <option value="forca">Força e resistência</option>
              <option value="saude">Saúde e bem-estar</option>
              <option value="funcional">Treino funcional</option>
            </select>
          </div>
          <div class="mb-3">
            <label class="form-label" for="nivel">Nível de experiência</label>
            <select class="form-select" id="nivel">
              <option value="">Selecione seu nível</option>
              <option value="iniciante">Iniciante (menos de 6 meses)</option>
              <option value="intermediario">Intermediário (6 meses – 2 anos)</option>
              <option value="avancado">Avançado (mais de 2 anos)</option>
            </select>
          </div>
          <div class="form-check mb-4">
            <input class="form-check-input" type="checkbox" id="termos" />
            <label class="form-check-label" for="termos" style="font-size:0.8rem; color: var(--mf-gray);">
              Li e aceito os <a href="#" class="auth-link">Termos de Uso</a> e a <a href="#" class="auth-link">Política de Privacidade</a>
            </label>
          </div>
          <div class="d-flex gap-2 justify-content-between mt-2">
            <button type="button" class="btn btn-outline-accent" style="min-width:100px" onclick="goStep(2)"><i class="bi bi-arrow-left me-1"></i> Voltar</button>
            <button type="submit" class="btn-accent-full" style="max-width:200px" id="submitBtn">
              <span id="submitText">Criar conta</span>
              <span id="submitSpinner" class="d-none"><span class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span>Aguarde...</span>
            </button>
          </div>
        </div>
      </form>

      <p class="auth-divider mt-4">Já tem conta? <a href="/login" class="auth-link">Fazer login</a></p>
    </div>
  </div>
</section>

<style>
.btn-show-pwd { position:absolute; right:10px; top:50%; transform:translateY(-50%); background:none; border:none; color:var(--mf-gray); cursor:pointer; padding:0; font-size:1rem; }
.btn-show-pwd:hover { color: var(--mf-white); }
.step-indicator { margin-bottom: 0.5rem; }
.step-dot { height: 4px; flex: 1; background: var(--mf-black-border); border-radius: 2px; transition: background 0.3s; }
.step-dot.active { background: var(--mf-green); }
.step-label { font-size: 0.75rem; color: var(--mf-gray); margin-bottom: 1rem; font-weight: 500; letter-spacing: 0.04em; }
.form-check-input { background-color: var(--mf-black); border-color: var(--mf-black-border); }
.form-check-input:checked { background-color: var(--mf-green); border-color: var(--mf-green); }
</style>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
async function fetchCsrf() {
  try {
    const r = await fetch('/api/csrf-token');
    const d = await r.json();
    document.getElementById('csrfToken').value = d.token || '';
  } catch {}
}
fetchCsrf();

function goStep(n) {
  [1,2,3].forEach(i => {
    document.getElementById('step'+i).classList.toggle('d-none', i !== n);
    document.getElementById('dot'+i).classList.toggle('active', i <= n);
  });
}

function togglePwd(inputId, iconId) {
  const el = document.getElementById(inputId);
  const icon = document.getElementById(iconId);
  el.type = el.type === 'password' ? 'text' : 'password';
  icon.className = el.type === 'password' ? 'bi bi-eye' : 'bi bi-eye-slash';
}

function checkPwd(val) {
  const bar = document.getElementById('pwdBar');
  const label = document.getElementById('pwdLabel');
  let strength = 0;
  if (val.length >= 8) strength++;
  if (/[A-Z]/.test(val)) strength++;
  if (/[0-9]/.test(val)) strength++;
  if (/[^A-Za-z0-9]/.test(val)) strength++;
  const map = [
    { w: '0%', bg: '#444', txt: 'Digite uma senha' },
    { w: '25%', bg: '#dc3545', txt: 'Muito fraca' },
    { w: '50%', bg: '#fd7e14', txt: 'Fraca' },
    { w: '75%', bg: '#ffc107', txt: 'Média' },
    { w: '100%', bg: '#39FF14', txt: 'Forte' },
  ];
  bar.style.width = map[strength].w;
  bar.style.background = map[strength].bg;
  label.textContent = map[strength].txt;
}

// CPF mask
document.getElementById('cpf').addEventListener('input', function() {
  let v = this.value.replace(/\D/g,'').substring(0,11);
  v = v.replace(/(\d{3})(\d)/, '$1.$2');
  v = v.replace(/(\d{3})(\d)/, '$1.$2');
  v = v.replace(/(\d{3})(\d{1,2})$/, '$1-$2');
  this.value = v;
});

// Phone mask
document.getElementById('telefone').addEventListener('input', function() {
  let v = this.value.replace(/\D/g,'').substring(0,11);
  v = v.replace(/^(\d{2})(\d)/, '($1) $2');
  v = v.replace(/(\d{5})(\d{4})$/, '$1-$2');
  this.value = v;
});

document.getElementById('cadastroForm').addEventListener('submit', async function(e) {
  e.preventDefault();
  const alert = document.getElementById('alertMsg');
  const success = document.getElementById('successMsg');
  alert.classList.add('d-none');
  success.classList.add('d-none');

  if (!document.getElementById('termos').checked) {
    alert.textContent = 'Você precisa aceitar os Termos de Uso para continuar.';
    alert.classList.remove('d-none'); return;
  }

  const pwd = document.getElementById('password').value;
  const cpwd = document.getElementById('confirmPwd').value;
  if (pwd !== cpwd) {
    alert.textContent = 'As senhas não conferem.';
    alert.classList.remove('d-none'); return;
  }

  const btn = document.getElementById('submitBtn');
  document.getElementById('submitText').classList.add('d-none');
  document.getElementById('submitSpinner').classList.remove('d-none');
  btn.disabled = true;

  const payload = {
    nome: document.getElementById('nome').value.trim(),
    cpf: document.getElementById('cpf').value.trim(),
    nascimento: document.getElementById('nascimento').value,
    telefone: document.getElementById('telefone').value.trim(),
    email: document.getElementById('email').value.trim(),
    password: pwd,
    plano: document.getElementById('plano').value,
    objetivo: document.getElementById('objetivo').value,
    nivel: document.getElementById('nivel').value
  };

  try {
    const csrf = document.getElementById('csrfToken').value;
    const res = await fetch('/api/cadastro', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'X-CSRF-Token': csrf },
      body: JSON.stringify(payload)
    });
    const data = await res.json();
    if (res.ok && data.success) {
      success.textContent = 'Conta criada com sucesso! Redirecionando...';
      success.classList.remove('d-none');
      setTimeout(() => window.location.href = '/dashboard', 1500);
    } else {
      alert.textContent = data.message || 'Erro ao criar conta. Tente novamente.';
      alert.classList.remove('d-none');
    }
  } catch {
    alert.textContent = 'Erro de conexão. Tente novamente.';
    alert.classList.remove('d-none');
  } finally {
    document.getElementById('submitText').classList.remove('d-none');
    document.getElementById('submitSpinner').classList.add('d-none');
    btn.disabled = false;
  }
});
</script>
</body>
</html>

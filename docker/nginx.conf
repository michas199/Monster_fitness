worker_processes auto;
error_log /var/log/nginx/error.log warn;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Logging ──────────────────────────────────────────────────────────────
    log_format  main  '$remote_addr - [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent"';
    access_log  /var/log/nginx/access.log  main;

    # ── Performance ──────────────────────────────────────────────────────────
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    gzip            on;
    gzip_comp_level 5;
    gzip_types      text/plain text/css application/json application/javascript
                    text/xml application/xml application/xml+rss text/javascript;

    # ── Rate limiting zones ──────────────────────────────────────────────────
    limit_req_zone  $binary_remote_addr zone=api_limit:10m   rate=30r/m;
    limit_req_zone  $binary_remote_addr zone=auth_limit:10m  rate=10r/m;
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

    # ── Upstream: Flask API ──────────────────────────────────────────────────
    upstream flask_api {
        server api:5000;
        keepalive 16;
    }

    server {
        listen 80;
        server_name _;

        # ── Segurança — Headers ──────────────────────────────────────────────
        add_header X-Frame-Options           "DENY"                always;
        add_header X-Content-Type-Options    "nosniff"             always;
        add_header X-XSS-Protection          "1; mode=block"       always;
        add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy        "geolocation=(), microphone=(), camera=()" always;

        # Hide nginx version
        server_tokens off;

        # ── Limite de conexões ───────────────────────────────────────────────
        limit_conn conn_limit 20;

        # ── Arquivos estáticos (servidos pelo Nginx) ─────────────────────────
        location /static/ {
            alias /app/static/;
            expires 7d;
            add_header Cache-Control "public, no-transform";
            access_log off;
        }

        # ── Rotas de autenticação (rate limit mais restrito) ─────────────────
        location ~ ^/api/(login|cadastro) {
            limit_req zone=auth_limit burst=5 nodelay;
            limit_req_status 429;

            proxy_pass         http://flask_api;
            proxy_http_version 1.1;
            proxy_set_header   Connection        "";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 30s;
        }

        # ── Demais rotas da API ──────────────────────────────────────────────
        location /api/ {
            limit_req zone=api_limit burst=15 nodelay;

            proxy_pass         http://flask_api;
            proxy_http_version 1.1;
            proxy_set_header   Connection        "";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 30s;
        }

        # ── Health check ─────────────────────────────────────────────────────
        location /health {
            proxy_pass http://flask_api/health;
            access_log off;
        }

        # ── Todas as outras rotas → Flask ────────────────────────────────────
        location / {
            proxy_pass         http://flask_api;
            proxy_http_version 1.1;
            proxy_set_header   Connection        "";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;

            # Cache de páginas estáticas
            proxy_cache_valid 200 1m;
        }

        # ── Bloqueia acesso a arquivos sensíveis ─────────────────────────────
        location ~ /\. {
            deny all;
        }
        location ~ \.(env|git|py|cfg|ini)$ {
            deny all;
        }
    }
}
